name: Publish Code Connect

on:
  push:
    branches: [main]
    paths:
      - 'src/**/*.figma.ts'
      - 'figma.config.ts'

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - run: npm install

      - run: npx figma connect publish --skip-validation
        env:
          FIGMA_ACCESS_TOKEN: ${{ secrets.FIGMA_TOKEN }}
